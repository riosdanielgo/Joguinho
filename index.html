<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="MycroGames: cinco party games offline para jogar com a galera usando um único celular." />
  <title>MycroGames — Party games para a sua squad</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      background: #f4f7fb;
      color: #172554;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.7;
      display: grid;
      min-height: 100svh;
      place-items: center;
      padding: 2rem 1.25rem;
    }
    main { max-width: 34rem; text-align: center; }
    img.logo { width: min(280px, 70vw); height: auto; }
    h1 { font-size: 1.9rem; letter-spacing: -0.02em; margin-top: 1.5rem; }
    p.lead { color: #475569; }
    .badge {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 0.6rem;
      padding: 0.35rem 0.9rem;
      margin-top: 1rem;
    }
    nav { margin-top: 2.25rem; display: flex; gap: 1.5rem; justify-content: center; }
    nav a { color: #be123c; font-weight: 700; }
    footer { margin-top: 2.5rem; color: #64748b; font-size: 0.8rem; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="./mycrogames-logo.png" alt="MycroGames" />
    <h1>Um celular. Cinco party games. A galera reunida.</h1>
    <p class="lead">
      Jogo do Impostor, Quem será?, Quiz dos Games, Sobrevivente e Gamer Mímica —
      100% offline, sem cadastro e sem coleta de dados.
    </p>
    <span class="badge">Em breve na App Store</span>
    <nav>
      <a href="./privacidade.html">Política de privacidade</a>
      <a href="./suporte.html">Suporte</a>
    </nav>
    <footer>© 2026 Daniel Rios</footer>
  </main>
</body>
</html>
